<div style="text-align: center; font-family: sans-serif; margin-top: 40px;">
  
  <h1>SERVICIO Y CONSUMICIÓN</h1>
  <p><em>Consigna: Implementar un servicio y consumirlo desde un componente.</em></p>
  
  <hr style="width: 50%; margin: 20px auto;">

  <h2>⛏️ Panel de Extracción de Datos</h2>
  
  <table border="1" style="margin: 0 auto; border-collapse: collapse; width: 50%; text-align: left;">
    <thead style="background-color: #f2f2f2;">
      <tr>
        <th style="padding: 10px;">Material</th>
        <th style="padding: 10px;">Pureza</th>
        <th style="padding: 10px;">Cantidad Extraída</th>
      </tr>
    </thead>
    <tbody>
      <!-- Consumiendo y recorriendo los datos del servicio -->
      <tr *ngFor="let mineral of mineralesExtraidos">
        <td style="padding: 10px;"><strong>{{ mineral.material }}</strong></td>
        <td style="padding: 10px;">{{ mineral.pureza }}</td>
        <td style="padding: 10px;">{{ mineral.cantidad }}</td>
      </tr>
    </tbody>
  </table>

</div>
